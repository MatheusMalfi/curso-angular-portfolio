<header>
  <img src="assets/img/malfi.png" [alt]="i18n.text().header.profileAlt" width="150px" height="150px" loading="eager" />
  <h1>Matheus Malfi Gonzaga</h1>
</header>

<aside>
  <div class="container">
    <!-- <p>Clik SoftHouse</p> -->
    <div class="language-switcher">
      <select id="language-select" [value]="i18n.currentLanguage()" (change)="onLanguageChange($event)">
        <option value="pt-BR">{{ i18n.text().languageOptions['pt-BR'] }}</option>
        <option value="en">{{ i18n.text().languageOptions.en }}</option>
      </select>
    </div>
    <p>{{ i18n.text().header.location }}</p>
    <!-- <p>Estou estagiando na empresa Clik SoftHouse e atuando no Front-end.</p> -->

    <nav>
      <ul>
        <li>
          <a [href]="getResumeLink()" target="_blank" class="btn btn-primary">
            {{ i18n.text().header.resumeButton }}
          </a>
        </li>

        <li>
          <a href="https://www.linkedin.com/in/matheus-malfi-gonzaga-343981215/" target="_blank"
            class="btn btn-secondary">
            LinkedIn
          </a>
        </li>

      </ul>
    </nav>

    <section>
      <figure>
        <img src="assets/icons/whatsapp.svg" [alt]="i18n.text().header.whatsappAlt" width="22px" height="24px" />

        <figcaption>
          <a [href]="getWhatsAppLink()" target="_blank">
            <strong>{{ i18n.text().header.contactWhatsApp }}</strong>
            <p>{{ i18n.text().header.whatsappNumber }}</p>
          </a>
        </figcaption>
      </figure>

      <figure>
        <img src="assets/icons/mail.svg" [alt]="i18n.text().header.emailAlt" width="22px" height="24px" />

        <figcaption>
          <a href="mailto:matheus.malfi@icloud.com" target="_blank">
            <strong>{{ i18n.text().header.contactEmail }}</strong>
            <p>matheus.malfi&#64;icloud.com</p>
          </a>
        </figcaption>
      </figure>
    </section>
  </div>
</aside>
